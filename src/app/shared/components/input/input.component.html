<div class="input-container" [formGroup]="inputFormGroup">

    <input [type]="type | lowercase" class="input-default" [formControlName]="inputFormControlName">
    <img *ngIf="srcPaths" [src]="src" alt="visualizar" (click)="showPassword()">
</div>
